<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COACHED BY BLAKE - Client Intake Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app"></div>
 
    <!-- Header -->
    <div class="header">
        <h1>COACHED BY BLAKE</h1>
        <p>Client Intake Form</p>
    </div>
 
    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="stepCounter">Step 1 of 8</p>
    </div>
 
    <!-- Form Container -->
   <div class="form-container">

    <form action="https://formspree.io/f/mkoeoypy" method="POST" id="intakeForm">

        <div id="formContent"></div>

        <!-- Navigation Buttons -->
        <div class="button-container">
            <button type="button" id="backBtn" class="btn btn-secondary" onclick="handlePrev()">← Back</button>

            <button type="button" id="nextBtn" class="btn btn-primary" onclick="handleNext()">
                Next →
            </button>

            <button type="submit" id="submitBtn" class="btn btn-primary" style="display:none;">
                Submit Application
            </button>
        </div>

    </form>

</div>
 
    <!-- Success Screen (Hidden by default) -->
    <div id="successScreen" class="success-screen" style="display: none;">
        <div class="success-content">
            <div class="success-icon">✅</div>
            <h1>Application Submitted!</h1>
            <p id="successMessage"></p>
            <p class="success-subtext">Expected response: 24-48 hours</p>
        </div>
    </div>
 
    <script src="script.js"></script>
</body>
</html>
